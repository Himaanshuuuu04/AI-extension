services:
  agentic-api:
    container_name: agentic-browser-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 5454
    ports:
      - "5454:5454"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5454/api/genai/health/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  agentic-mcp:
    container_name: agentic-browser-mcp
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["uv", "run", "python", "main.py", "--mcp"]
    stdin_open: true
    tty: true
    profiles:
      - mcp
